name: mydschool
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  url_launcher: ^6.2.5
  http: ^1.1.0
  path_provider: ^2.1.2
  open_filex: ^4.4.0
  permission_handler: ^12.0.1
  pdfx: ^2.6.0
  intl: ^0.20.2
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: 18.0.1
  shared_preferences: ^2.3.4
  uuid: ^4.0.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ss_launch.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#667eea"
  adaptive_icon_foreground: "assets/ss_launch.png"
  adaptive_icon_padding: 0.15

flutter_native_splash:
  color: "#667eea"
  image: assets/ss_splash.png
  fullscreen: true
  android_12:
    color: "#667eea"
    image: assets/ss_splash.png